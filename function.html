<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
</head>
<body>
    <!-- syntax- function function_name()
    {
        statement;
    }
    function_name(); -->

    <script>
        function hello()
        {
            document.write("hello everyone."+"<br>");
        }
        hello();
    </script>

    <script>
        function sum(a,b)
        {
            document.write(a+b+"<br>");
        }
        sum(5,5);

        function sub(a,b)
        {
            document.write(a-b+"<br>");
        }
        sub(5,5);
    </script>

    <script>
        const add = (a,b,c)=>
    {
        document.write(a+b+c+"<br>")
    }
    add(20,10,30);
    </script>
</body>
</html>
