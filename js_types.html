<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Types</title>
</head>
<body>
    
    <button onclick="alert('This ia an inline script.')">Click here</button>
    <button onclick="Showmsg()">Click here</button>

        function Showmsg()
        {
            alert("This is an internal script.")
        }
    </Script>

    <script>
        document.write("<h1>Welcome to pune.</h1>")
        console.log("hello")
    </script>
