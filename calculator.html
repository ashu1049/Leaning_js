<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <main>
        <br>
        <div class="container">
            <div class="row">
                <div class="col-md-4"></div>
                <div class="col-md-4 border border-primary p-3">
                    <form name="myform">
                        <div class="row">

                            <h1 class="text-center">Calculator</h1>

                            <!-- First Number -->
                            <div class="col-md-6 my-3">
                                <label class="form-label">Enter First Number</label>
                                <input type="number" name="n1" class="form-control" placeholder="Enter First Number">
                            </div>

                            <!-- Second Number -->
                            <div class="col-md-6 my-3">
                                <label class="form-label">Enter Second Number</label>
                                <input type="number" name="n2" class="form-control" placeholder="Enter Second Number">
                            </div>

                            <!-- Buttons -->
                            <div class="col-md-2 text-center">
                                <button type="button" onclick="add()" class="btn btn-success">+</button>
                            </div>

                            <div class="col-md-2 text-center">
                                <button type="button" onclick="sub()" class="btn btn-success">-</button>
                            </div>

                            <div class="col-md-2 text-center">
                                <button type="button" onclick="mul()" class="btn btn-success">*</button>
                            </div>

                            <div class="col-md-2 text-center">
                                <button type="button" onclick="divi()" class="btn btn-success">/</button>
                            </div>

                            <!-- Reset -->
                            <div class="col-md-12 text-center my-3">
                                <button type="reset" class="btn btn-danger">Reset</button>
                            </div>

                            <!-- Result -->
                            <div class="col-md-12 my-3">
                                <label class="form-label">Result</label>
                                <input type="number" name="res" class="form-control" disabled>
                            </div>

                        </div>
                    </form>
                </div>
                <div class="col-md-4"></div>
            </div>
        </div>
    </main>

    <script>
        var a,b,result;
        function add() {
            a = Number(document.myform.n1.value);
            b = Number(document.myform.n2.value);
            result=a+b;
            document.myform.res.value = (result).toFixed(2);
        }

        function sub() {
            a = Number(document.myform.n1.value);
            b = Number(document.myform.n2.value);
            result=a-b;
            document.myform.res.value = (result).toFixed(2);
        }

        function mul() {
            a = Number(document.myform.n1.value);
            b = Number(document.myform.n2.value);
            result=a*b;
            document.myform.res.value = (result).toFixed(2);
        }

        function divi() {
            a = Number(document.myform.n1.value);
            b = Number(document.myform.n2.value);
            result=a/b;
            document.myform.res.value = (result).toFixed(2);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap"></script>
