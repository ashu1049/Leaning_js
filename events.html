<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Events</title>
</head>
<body>
    <button onclick="hello()">Single click</button>
    <button ondblclick="hello()">double click</button>
    <button oncontextmenu="hello()">double right click</button>
    <button onmouseenter="hello()">on mouse enter </button>
    <button onmouseout="hello()">on mouse out</button>
    <button onblur="hello()">onblur</button>
    <button onchange="hello()">change</button>

    <script>
        function hello()
        {
            alert("key events.");
        }
    </script>
</body>
</html>
