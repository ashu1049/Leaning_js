<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h2>Digital Clock</h2>
    <h2 id="clock"></h2>
    <p id="msg">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quidem magni animi libero fugiat placeat molestiae vel eveniet. A ratione cum dolorem iure expedita, optio esse omnis quae vitae animi neque.</p>

    <h1>Counter</h1>
    <h3 id="count">0</h3>
    <button onclick="stopcounter()">stop</button>

    <script>
        let count=0;
        let counter = setInterval(function(){
            count++;
            document.getElementById("count").innerHTML=count;
        },1000);
        function stopcounter()
        {
            clearInterval(counter);
        }
    </script>

    <script>

        function showtime()
        {
            let now = new Date();
            let time = now.toLocaleTimeString();
            document.getElementById("clock").innerHTML=time;
            setInterval(showtime,1000);
        }
        showtime();
    </script>

    <script>
        setTimeout(function()
    {
        document.getElementById("msg").innerHTML="hello its ashu";
    },5000)
    </script>
</body>
</html>
